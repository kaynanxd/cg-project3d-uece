<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Projeto WebGL - Doom</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; color: white; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        
        /* Camada de Interface (Fica por cima do WebGL) */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background-color: red; transform: translate(-50%, -50%); border-radius: 50%;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto;
        }

        h1 { font-size: 4rem; color: #ff3333; text-transform: uppercase; text-shadow: 2px 2px #000; }
        
        .btn {
            background-color: #440000; color: white; border: 2px solid #ff3333;
            padding: 15px 30px; margin: 10px; font-size: 1.5rem; cursor: pointer;
            font-family: inherit; transition: 0.2s;
        }
        .btn:hover { background-color: #ff3333; color: black; }

        /* HUD durante o jogo */
        #hud {
            position: absolute; bottom: 20px; left: 20px; font-size: 1.5rem; 
            text-shadow: 2px 2px #000; display: none; font-weight: bold;
        }
        #hud-hp { color: #ff3333; }
        #hud-stamina { color: #33ff33; }
        #hud-damage, #hud-lives, #hud-piercing { color: #ffffff; }
        #hud-stats-grid { display: flex; flex-direction: column; gap: 2px; }
        #hud-stats-grid .stat-row { display: flex; gap: 20px; }
        #hud-stats-grid .stat-label { color: #aaa; }
        #hud-wave { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; display: none; }

        /* Upgrade Screen */
        #upgrade-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto; z-index: 50;
        }
        #upgrade-screen h2 {
            font-size: 3rem; color: #ffcc00; margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }
        #upgrade-choices {
            display: flex; gap: 30px; flex-wrap: wrap; justify-content: center;
        }
        .upgrade-card {
            background: rgba(20, 20, 30, 0.9); border: 2px solid #555;
            border-radius: 8px; padding: 30px 40px; cursor: pointer;
            text-align: center; transition: all 0.2s; min-width: 200px;
        }
        .upgrade-card:hover {
            border-color: #ffcc00; background: rgba(40, 40, 60, 0.9);
            transform: scale(1.08); box-shadow: 0 0 25px rgba(255, 204, 0, 0.3);
        }
        .upgrade-card .upgrade-name {
            font-size: 1.5rem; color: #fff; margin-bottom: 8px; font-weight: bold;
        }
        .upgrade-card .upgrade-desc {
            font-size: 0.9rem; color: #aaa;
        }
        /* Isso garante que o canvas fique atrás de tudo */
        #glcanvas1 {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Isso garante que a camada de interface (menus) fique sempre na frente */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100; /* Alto o suficiente para sobrepor o canvas */
            pointer-events: none; /* O mouse passa direto pela camada, EXCETO pelos botões */
        }

        /* Botões e menus dentro do ui-layer devem ter isso */
        .screen, #pause-screen {
            pointer-events: auto; /* IMPORTANTE: Isso habilita o clique aqui */
            display: flex;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas1"></canvas>
    
    <div id="ui-layer">
        <div id="crosshair" style="display: none;"></div>
        
        <div id="hud">
            <div id="hud-stats-grid">
                <div>HP: <span id="hud-hp">100</span>/<span id="hud-maxhp">100</span></div>
                <div>STAMINA: <span id="hud-stamina">100</span>/<span id="hud-maxstamina">100</span></div>
                <div class="stat-row">
                    <span><span class="stat-label">DMG:</span> <span id="hud-damage">50</span></span>
                    <span><span class="stat-label">LIVES:</span> <span id="hud-lives">0</span></span>
                    <span><span class="stat-label">PIERCE:</span> <span id="hud-piercing">0</span></span>
                </div>
            </div>
        </div>
        <div id="hud-wave">Horda: <span id="wave-count">1</span>/<span id="wave-total">3</span></div>

        <div id="upgrade-screen">
            <h2>ESCOLHA UM UPGRADE</h2>
            <div id="upgrade-choices"></div>
        </div>

        <div id="menu-screen" class="screen">
            <h1>WEBGL DOOM</h1>
            <p>Selecione a Dificuldade</p>
            <button class="btn" onclick="startGame('EASY')">Fácil</button>
            <button class="btn" onclick="startGame('NORMAL')">Normal</button>
            <button class="btn" onclick="startGame('HARD')">Difícil</button>
        </div>

        <div id="pause-screen" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); color:white; flex-direction:column; justify-content:center; align-items:center; z-index:10;">
            <h1>PAUSADO</h1>
            <button class="btn" onclick="resumeGame()">Continuar</button>
            <button class="btn" onclick="window.location.reload()">Voltar ao Menu</button>
        </div>

        <div id="game-over-screen" class="screen" style="display: none;">
            <h1>VOCÊ MORREU</h1>
            <button class="btn" onclick="location.reload()">Voltar ao Menu</button>
        </div>

        <div id="victory-screen" class="screen" style="display: none;">
            <h1 style="color: #33ff33; border-color: #33ff33;">VITÓRIA!</h1>
            <p>O labirinto foi limpo.</p>
            <button class="btn" onclick="location.reload()">Voltar ao Menu</button>
        </div>
    </div>

    <script src="engine/matrix.js"></script>
    <script src="engine/input.js"></script>
    <script src="engine/camera.js"></script>
    <script src="engine/texture.js"></script>
    <script src="engine/mesh.js"></script>
    <script src="engine/obj_loader.js"></script>
    <script src="engine/shaders.js"></script>

    <script src="game/projectile.js"></script>
    <script src="game/enemy.js"></script>
    <script src="game/player.js"></script>
    <script src="game/horde_manager.js"></script>
    <script src="game/powerup_types.js"></script>
    <script src="game/game_main.js"></script>
    <script src="engine/audio.js"></script>
</body>
</html>
